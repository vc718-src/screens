<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Desk Clock</title>
    <style>
        body { background: transparent; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .time-container { font-size: 18vw; font-weight: 800; text-shadow: 0 0 40px rgba(56, 189, 248, 0.4); color: #f8fafc; letter-spacing: -5px; line-height: 1; }
        .sec-ampm { font-size: 5vw; color: #38bdf8; font-weight: 600; letter-spacing: 0; margin-left: 15px; }
        .date-container { font-size: 4vw; color: #94a3b8; margin-top: 20px; font-weight: 500; text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="time-container">
        <span id="hour-min">00:00</span><span class="sec-ampm" id="sec-ampm">00 AM</span>
    </div>
    <div class="date-container" id="date">DAY, MONTH 00</div>
    <script>
        function update() {
            const now = new Date();
            let h = now.getHours();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; // 12-hour format
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('hour-min').innerText = `${h}:${m}`;
            document.getElementById('sec-ampm').innerText = `${s} ${ampm}`;
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
