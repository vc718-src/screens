<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World News</title>
    <style>
        body { background: transparent; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; height: 100vh; box-sizing: border-box; overflow: hidden; }
        .panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); border-radius: 16px; padding: 30px; height: 100%; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        h2 { margin-top: 0; color: #f87171; font-size: 28px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px;}
        
        .news-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; }
        .news-list::-webkit-scrollbar { width: 0px; } 
        
        .news-item { background: rgba(15, 23, 42, 0.8); padding: 20px; border-radius: 12px; border-left: 4px solid #f87171; }
        .news-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; color: #f8fafc; }
        .news-date { font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>📰 RTHK Latest Headlines</h2>
        <div class="news-list" id="news-container">
            <div class="news-item"><div class="news-title">Fetching live news...</div></div>
        </div>
    </div>
    <script>
        async function fetchNews() {
            const rssUrl = 'https://rthk.hk/rthk/news/rss/e_expressnews.xml';
            // Use corsproxy for pure XML passthrough
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(rssUrl)}`;
            
            try {
                const response = await fetch(proxyUrl);
                const textData = await response.text();
                
                const parser = new DOMParser();
                const xml = parser.parseFromString(textData, "text/xml");
                
                // RTHK puts articles inside <item> tags
                const items = Array.from(xml.querySelectorAll("item")).slice(0, 8); 
                
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                
                if(items.length === 0) throw new Error("No items found");

                items.forEach(item => {
                    const title = item.querySelector("title").textContent;
                    const pubDate = new Date(item.querySelector("pubDate").textContent).toLocaleString('en-US', {hour: '2-digit', minute:'2-digit', month:'short', day:'numeric'});
                    container.innerHTML += `
                        <div class="news-item">
                            <div class="news-title">${title}</div>
                            <div class="news-date">${pubDate}</div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error(e);
                document.getElementById('news-container').innerHTML = '<div class="news-item"><div class="news-title" style="color:#ef4444;">Failed to load news. Proxy may be rate limited.</div></div>';
            }
        }
        
        fetchNews();
        setInterval(fetchNews, 300000); 
    </script>
</body>
</html>
