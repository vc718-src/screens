<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Dashboard</title>
    <style>
        /* E-INK OPTIMIZED CSS */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif; /* Elegant Kindle serif */
            margin: 0;
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            border-bottom: 4px solid #000000;
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        #current-date {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
        }

        /* Quote Section */
        .quote-container {
            margin-bottom: 40px;
            padding: 20px;
            border: 2px solid #000000;
        }

        #quote-text {
            font-size: 2.2rem;
            font-style: italic;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }

        #quote-author {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: right;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Weather Section */
        .weather-header {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }

        td {
            padding: 15px 0;
            border-bottom: 2px solid #000000;
            font-size: 1.8rem;
            vertical-align: top;
        }

        .td-day { font-weight: bold; width: 20%; }
        .td-temp { font-weight: bold; width: 25%; text-align: center; }
        .td-desc { width: 55%; font-size: 1.4rem; line-height: 1.3; }

    </style>
</head>
<body>

    <div class="header">
        <h1 id="current-date">Loading...</h1>
    </div>

    <div class="quote-container">
        <p id="quote-text">"Loading inspiration..."</p>
        <p id="quote-author">-</p>
    </div>

    <div class="weather-header">Hong Kong Forecast</div>
    <table id="forecast-table">
        <!-- Weather data will be injected here -->
    </table>

    <script>
        // 1. Set the current date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', options);

        // 2. Fetch Quote of the Day
        async function fetchQuote() {
            try {
                // Using a reliable public API for random quotes
                const response = await fetch('https://dummyjson.com/quotes/random');
                const data = await response.json();
                document.getElementById('quote-text').innerText = `"${data.quote}"`;
                document.getElementById('quote-author').innerText = `- ${data.author}`;
            } catch (e) {
                document.getElementById('quote-text').innerText = "An error occurred fetching the quote.";
            }
        }

        // 3. Fetch HKO 9-Day Forecast
        async function fetchForecast() {
            try {
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=en');
                const data = await response.json();
                
                const table = document.getElementById('forecast-table');
                table.innerHTML = ''; // Clear table

                // Only show the next 5 days so it fits nicely on the Kindle screen
                const daysToShow = data.weatherForecast.slice(0, 5);

                daysToShow.forEach(day => {
                    // Convert "20260721" to a readable format if needed, but HKO provides the 'week' (e.g. "Tuesday")
                    const weekDay = day.week.substring(0, 3); // Shorten to "Tue"
                    const minTemp = day.forecastMintemp.value;
                    const maxTemp = day.forecastMaxtemp.value;
                    
                    table.innerHTML += `
                        <tr>
                            <td class="td-day">${weekDay}</td>
                            <td class="td-temp">${minTemp}° - ${maxTemp}°</td>
                            <td class="td-desc">${day.forecastWeather}</td>
                        </tr>
                    `;
                });
            } catch (e) {
                document.getElementById('forecast-table').innerHTML = '<tr><td>Error loading weather data.</td></tr>';
            }
        }

        // Initialize
        fetchQuote();
        fetchForecast();

        // HARD REFRESH EVERY 60 MINUTES (3600000 ms)
        // This forces the Kindle to flash the screen, removing e-ink ghosting.
        setTimeout(() => {
            window.location.reload(true);
        }, 3600000);

    </script>
</body>
</html>
