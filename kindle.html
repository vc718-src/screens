<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Dashboard</title>
    <style>
        /* E-INK OPTIMIZED CSS */
        body {
            background-color: #ffffff;
            color: #000000;
            /* Using standard serif fonts that Kindle supports well for Chinese characters */
            font-family: "Palatino Linotype", "Book Antiqua", "PMingLiU", "MingLiU", serif; 
            margin: 0;
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            border-bottom: 4px solid #000000;
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        #current-date {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
        }

        /* Quote Section */
        .quote-container {
            margin-bottom: 40px;
            padding: 20px;
            border: 2px solid #000000;
        }

        #quote-text {
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            line-height: 1.5;
            letter-spacing: 2px;
        }

        #quote-author {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: right;
            margin: 0;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
        }

        /* Weather Section */
        .weather-header {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
        }

        td {
            padding: 15px 0;
            border-bottom: 2px solid #000000;
            font-size: 1.8rem;
            vertical-align: top;
        }

        .td-day { font-weight: bold; width: 25%; }
        .td-temp { font-weight: bold; width: 25%; text-align: center; }
        .td-desc { width: 50%; font-size: 1.5rem; line-height: 1.4; }

    </style>
</head>
<body>

    <div class="header">
        <h1 id="current-date">載入中...</h1>
    </div>

    <div class="quote-container">
        <p id="quote-text">「載入金句中...」</p>
        <p id="quote-author">-</p>
    </div>

    <div class="weather-header">香港九天天氣預報</div>
    <table id="forecast-table">
        <!-- Weather data will be injected here -->
    </table>

    <script>
        // 1. Set the current date in Traditional Chinese
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-HK', options);

        // 2. Fetch Quote of the Day (Hitokoto API for Chinese Quotes)
        async function fetchQuote() {
            try {
                // 'c=i' means poetry/literature. 
                const response = await fetch('https://v1.hitokoto.cn/?c=i&c=d&c=k');
                const data = await response.json();
                
                // Using traditional Chinese quotation marks
                document.getElementById('quote-text').innerText = `「${data.hitokoto}」`;
                
                // If there is an author or source, display it
                let source = data.from;
                if (data.from_who) {
                    source = `${data.from_who}《${data.from}》`;
                }
                document.getElementById('quote-author').innerText = `- ${source || "佚名"}`;
            } catch (e) {
                document.getElementById('quote-text').innerText = "「讀取金句時發生錯誤。」";
                document.getElementById('quote-author').innerText = "";
            }
        }

        // 3. Fetch HKO 9-Day Forecast (lang=tc for Traditional Chinese)
        async function fetchForecast() {
            try {
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const data = await response.json();
                
                const table = document.getElementById('forecast-table');
                table.innerHTML = ''; 

                const daysToShow = data.weatherForecast.slice(0, 5);

                daysToShow.forEach(day => {
                    const weekDay = day.week; 
                    const minTemp = day.forecastMintemp.value;
                    const maxTemp = day.forecastMaxtemp.value;
                    
                    table.innerHTML += `
                        <tr>
                            <td class="td-day">${weekDay}</td>
                            <td class="td-temp">${minTemp}° - ${maxTemp}°</td>
                            <td class="td-desc">${day.forecastWeather}</td>
                        </tr>
                    `;
                });
            } catch (e) {
                document.getElementById('forecast-table').innerHTML = '<tr><td>無法載入天氣數據。</td></tr>';
            }
        }

        // Initialize
        fetchQuote();
        fetchForecast();

        // HARD REFRESH EVERY 60 MINUTES (3600000 ms)
        setTimeout(() => {
            window.location.reload(true);
        }, 3600000);

    </script>
</body>
</html>
