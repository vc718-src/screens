<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Smart Dashboard</title>
    <style>
        /* --- CALM DARK THEME --- */
        :root {
            --bg1: #0b1220; --bg2: #111827;
            --panel: #1e293b; --panel-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc; --text-sub: #94a3b8;
            --accent-cyan: #38bdf8; --accent-amber: #f59e0b;
            --alert-red: #ef4444; --alert-yellow: #facc15; --alert-green: #4ade80;
        }

        body.night-mode {
            --bg1: #000000; --bg2: #050505;
            --panel: #0f0f0f;
            --text-main: #d97706; --text-sub: #92400e;
            --accent-cyan: #d97706; --accent-amber: #b45309;
            filter: brightness(0.7);
        }

        body {
            margin: 0; padding: 0; box-sizing: border-box;
            background: linear-gradient(160deg, var(--bg1), var(--bg2));
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden; transition: all 1s ease;
        }

        /* --- IPAD OPTIMIZED GRID --- */
        .app {
            height: 100vh; padding: 12px; box-sizing: border-box;
            display: grid;
            grid-template-rows: 55px 1fr 115px; /* Slim header, slightly taller footer for dates */
            gap: 12px;
        }

        .main-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 12px; min-height: 0; }
        .side-column { display: grid; grid-template-rows: auto 1fr; gap: 12px; }

        /* --- PANELS --- */
        .panel {
            background: var(--panel); border: 1px solid var(--panel-border);
            border-radius: 16px; padding: 15px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; justify-content: center;
        }
        
        /* --- SINGLE LINE HEADER ENFORCEMENT --- */
        .topbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 15px; /* Reduced padding */
            height: 50px; /* Force small height */
            white-space: nowrap; overflow: hidden; 
        }

        .time-group { display: flex; align-items: baseline; gap: 10px; }
        #live-time { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
        #live-date { font-size: 14px; color: var(--text-sub); font-weight: 500; }
        
        .status-group { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 600; }
        
        .warning-badge { 
            background: rgba(239, 68, 68, 0.2); color: var(--alert-red); 
            padding: 3px 8px; border-radius: 6px; font-size: 13px; 
            display: none; max-width: 140px; overflow: hidden; text-overflow: ellipsis; 
        }

        /* --- MAIN WEATHER PANEL --- */
        .weather-panel { justify-content: space-between; }
        .weather-now { display: flex; align-items: center; gap: 15px; height: 130px; }
        .w-icon-big { font-size: 75px; font-family: "Apple Color Emoji", sans-serif; }
        .w-current-temp { font-size: 60px; font-weight: 700; line-height: 1; color: var(--text-main); }
        .w-details { display: flex; flex-direction: column; gap: 4px; justify-content: center; }
        
        .w-desc { 
            font-size: 22px; font-weight: 500; color: var(--accent-cyan);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; line-height: 1.2; max-width: 95%;
        }
        .w-minmax { font-size: 15px; color: var(--text-sub); }

        .hourly-row { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--panel-border); }
        .hour-card { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .h-time { font-size: 14px; color: var(--text-sub); }
        .h-icon { font-size: 26px; font-family: "Apple Color Emoji", sans-serif; margin: 2px 0; }
        .h-temp { font-size: 18px; font-weight: 600; }

        /* --- UTILITY PANELS (BUS & QUOTE) --- */
        .panel-title { display: flex; justify-content: space-between; align-items: center; font-size: 14px; text-transform: uppercase; color: var(--text-sub); font-weight: 700; letter-spacing: 1px; margin-bottom: 12px; }
        .route-btn { background: transparent; border: none; color: var(--text-sub); font-size: 16px; cursor: pointer; padding: 0 5px; transition: color 0.2s; }
        .route-btn:hover { color: var(--text-main); }

        .bus-list { display: flex; flex-direction: column; gap: 8px; }
        .bus-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(0,0,0,0.2); border-radius: 10px; border-left: 4px solid var(--text-sub); }
        .bus-item.next { border-left-color: var(--accent-cyan); background: rgba(56, 189, 248, 0.05); }
        .bus-time { font-size: 15px; font-weight: 500; }
        .bus-min { font-size: 20px; font-weight: 700; color: var(--accent-cyan); }
        .bus-item.urgent .bus-min { color: var(--alert-red); }

        .quote-panel { justify-content: center; text-align: center; padding: 15px; }
        #quote-text { font-size: 20px; line-height: 1.5; font-family: "Microsoft JhengHei", sans-serif; color: var(--text-main); }
        #quote-author { font-size: 14px; color: var(--text-sub); margin-top: 10px; font-family: "Microsoft JhengHei", sans-serif; }

        /* --- FOOTER 7-DAY STRIP --- */
        .forecast-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 10px; }
        .day-card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        /* Make name a single row flexbox */
        .d-name { display: flex; flex-direction: row; align-items: baseline; gap: 4px; }
        .d-weekday { font-size: 13px; color: var(--text-main); font-weight: 600; text-transform: uppercase; }
        .d-date { font-size: 11px; color: var(--text-sub); }
        .d-icon { font-size: 22px; font-family: "Apple Color Emoji", sans-serif; }
        .d-temp { font-size: 14px; font-weight: 600; }
        
        /* Route Menu Dropdown */
        #route-menu { position: fixed; top: 160px; right: 20px; background: rgba(15, 23, 42, 0.95); border: 1px solid var(--panel-border); border-radius: 12px; padding: 10px; display: none; flex-direction: column; gap: 8px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .route-option-btn { background: transparent; color: #e2e8f0; border: none; padding: 10px; text-align: left; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app">
        <!-- SINGLE LINE HEADER -->
        <header class="panel topbar">
            <div class="time-group">
                <div id="live-time">00:00</div>
                <div id="live-date">Loading...</div>
            </div>
            <div class="status-group">
                <div class="warning-badge" id="warning-badge">⚠️ Warning</div>
                <div style="color: var(--accent-amber);" id="header-temp">--°C</div>
                <div style="color: var(--accent-cyan);" id="header-hum">--%</div>
            </div>
        </header>

        <!-- MAIN GRID -->
        <main class="main-grid">
            <!-- WEATHER PANEL -->
            <section class="panel weather-panel">
                <div class="weather-now">
                    <div class="w-icon-big" id="w-main-icon">⛅</div>
                    <div class="w-current-temp" id="w-main-temp">--°</div>
                    <div class="w-details">
                        <div class="w-desc" id="w-main-desc">Loading...</div>
                        <div class="w-minmax" id="w-main-minmax">--° / --°</div>
                        <div class="w-minmax" id="w-uv">UV: --</div>
                    </div>
                </div>
                <div class="hourly-row" id="hourly-container"></div>
            </section>

            <!-- SIDE UTILITIES -->
            <aside class="side-column">
                <section class="panel bus-panel">
                    <div class="panel-title">
                        <span id="bus-header">🚍 KMB Schedule</span>
                        <button class="route-btn" onclick="toggleRouteMenu()">⚲</button>
                    </div>
                    <div class="bus-list" id="kmb-data">
                        <div class="bus-item"><span class="bus-time">Loading...</span></div>
                    </div>
                </section>

                <section class="panel quote-panel">
                    <div id="quote-text">載入中...</div>
                    <div id="quote-author">-</div>
                </section>
            </aside>
        </main>

        <!-- 7-DAY STRIP -->
        <footer class="panel forecast-strip" id="forecast-strip"></footer>
    </div>

    <!-- Dropdown Menu -->
    <div id="route-menu"></div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            
            const hour = now.getHours();
            if (hour >= 23 || hour < 6) document.body.classList.add('night-mode');
            else document.body.classList.remove('night-mode');
        }
        setInterval(updateClock, 1000); updateClock();

        function getHkoEmoji(iconNum, isNight = false) {
            const num = parseInt(iconNum);
            if (num >= 50 && num <= 54) return isNight ? '🌙' : '☀️';
            if (num >= 60 && num <= 61) return isNight ? '☁️' : '⛅';
            if (num >= 62 && num <= 65) return '🌧️'; 
            if (num >= 70 && num <= 77) return '⛈️'; 
            return '☁️';
        }

        async function fetchWeather() {
            try {
                const resCurrent = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en');
                const wData = await resCurrent.json();
                const ktTemp = wData.temperature.data.find(t => t.place === "Kwun Tong") || wData.temperature.data[0];
                const uv = wData.uvindex ? wData.uvindex.data[0].value : '--';
                
                document.getElementById('header-temp').innerText = `${ktTemp.value}°C`;
                document.getElementById('header-hum').innerText = `${wData.humidity.data[0].value}%`;
                document.getElementById('w-main-temp').innerText = `${ktTemp.value}°`;
                document.getElementById('w-uv').innerText = `UV Index: ${uv}`;

                const resWarn = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en');
                const warnData = await resWarn.json();
                const badge = document.getElementById('warning-badge');
                if (warnData && Object.keys(warnData).length > 0) {
                    badge.innerText = `⚠️ ${warnData[Object.keys(warnData)[0]].name}`;
                    badge.style.display = 'block';
                } else { badge.style.display = 'none'; }

                const resForecast = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=en');
                const fData = await resForecast.json();
                const today = fData.weatherForecast[0];
                document.getElementById('w-main-minmax').innerText = `${today.forecastMintemp.value}° / ${today.forecastMaxtemp.value}°`;
                document.getElementById('w-main-desc').innerText = today.forecastWeather.split('.')[0]; 

                const currentHour = new Date().getHours();
                const isNightNow = currentHour >= 19 || currentHour < 6;
                const currentIconNum = wData.icon[0];
                document.getElementById('w-main-icon').innerText = getHkoEmoji(currentIconNum, isNightNow);

                // Populate 7-Day Footer Strip
                const strip = document.getElementById('forecast-strip');
                strip.innerHTML = '';
                for (let i = 0; i < 7; i++) {
                    const day = fData.weatherForecast[i];
                    const dateStr = day.forecastDate; // e.g., "20260722"
                    const formattedDate = `${parseInt(dateStr.substring(6, 8))}/${parseInt(dateStr.substring(4, 6))}`; // e.g., "22/7"
                    
                    strip.innerHTML += `
                        <div class="day-card">
                            <div class="d-name">
                                <span class="d-weekday">${day.week.substring(0,3)}</span>
                                <span class="d-date">${formattedDate}</span>
                            </div>
                            <div class="d-icon">${getHkoEmoji(day.ForecastIcon, false)}</div>
                            <div class="d-temp">${day.forecastMintemp.value}° - ${day.forecastMaxtemp.value}°</div>
                        </div>`;
                }

                const hourlyCont = document.getElementById('hourly-container');
                hourlyCont.innerHTML = '';
                let baseTemp = ktTemp.value;

                for (let i = 1; i <= 5; i++) {
                    let displayHour = (currentHour + (i * 2)) % 24; 
                    let ampm = displayHour >= 12 ? 'PM' : 'AM';
                    let h12 = displayHour % 12 || 12;
                    let timeStr = i === 5 ? 'TMRW' : `${h12} ${ampm}`;
                    
                    let isHourNight = displayHour >= 19 || displayHour < 6;
                    let modTemp = baseTemp + (displayHour > 8 && displayHour < 16 ? 1 : -1);
                    
                    hourlyCont.innerHTML += `
                        <div class="hour-card">
                            <div class="h-time">${timeStr}</div>
                            <div class="h-icon">${getHkoEmoji(currentIconNum, isHourNight)}</div>
                            <div class="h-temp">${modTemp}°</div>
                        </div>`;
                }
            } catch (e) {}
        }

        // --- BUS ---
        const predefinedRoutes = [
            { id: 0, stopId: '215D99B3E2A5F8DD', route: '215X', dir: 'O', desc: 'To Kowloon' },
            { id: 1, stopId: '92AA28BBE48D6B2E', route: '16',   dir: 'O', desc: 'To Mong Kok' },
            { id: 2, stopId: '6C6B36F7550907CE', route: '14',   dir: 'O', desc: 'To China Ferry' },
            { id: 3, stopId: '9D676B8892807F9D', route: '603',  dir: 'O', desc: 'To Central' }
        ];
        let currentRouteIndex = 0;

        function buildMenu() {
            const menu = document.getElementById('route-menu');
            predefinedRoutes.forEach((r, index) => {
                menu.innerHTML += `<button class="route-option-btn" onclick="selectRoute(${index})">🚍 ${r.route} ${r.desc}</button>`;
            });
        }
        function toggleRouteMenu() { document.getElementById('route-menu').style.display = (document.getElementById('route-menu').style.display === 'flex') ? 'none' : 'flex'; }
        function selectRoute(index) { currentRouteIndex = index; toggleRouteMenu(); fetchKMB(); }
        buildMenu();

        async function fetchKMB() {
            const config = predefinedRoutes[currentRouteIndex];
            document.getElementById('bus-header').innerText = `🚍 ${config.route}`;
            try {
                const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${config.stopId}/${config.route}/1`);
                const result = await response.json();
                const container = document.getElementById('kmb-data'); container.innerHTML = '';
                
                if (result.data) {
                    let validBuses = result.data.filter(b => b.eta && b.dir === config.dir).sort((a, b) => new Date(a.eta) - new Date(b.eta));
                    let seenMins = new Set(); let count = 0;
                    for (let bus of validBuses) {
                        if (count >= 3) break; 
                        let diffMins = Math.max(0, Math.round((new Date(bus.eta) - new Date()) / 60000));
                        if (seenMins.has(diffMins)) continue; seenMins.add(diffMins);
                        
                        let displayMins = `${diffMins}m`; let cls = count === 0 ? 'next' : '';
                        if (diffMins <= 2) { displayMins = 'Arr'; cls += ' urgent'; }

                        container.innerHTML += `
                        <div class="bus-item ${cls}">
                            <span class="bus-time">${new Date(bus.eta).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'})}</span>
                            <span class="bus-min">${displayMins}</span>
                        </div>`;
                        count++;
                    }
                    if(count === 0) container.innerHTML = '<div class="bus-item"><span class="bus-time">No buses</span></div>';
                }
            } catch (e) {}
        }

        // --- QUOTE ---
        async function fetchQuote() {
            try {
                const response = await fetch('https://v1.hitokoto.cn/?c=i&c=d&c=k', { headers: { 'Accept': 'application/json' }});
                const data = await response.json();
                document.getElementById('quote-text').innerText = `「${data.hitokoto}」`;
                document.getElementById('quote-author').innerText = `- ${data.from_who || data.from || "佚名"}`;
            } catch (e) {
                document.getElementById('quote-text').innerText = "「千里之行，始於足下。」"; document.getElementById('quote-author').innerText = "- 老子";
            }
        }

        fetchWeather(); fetchKMB(); fetchQuote(); 
        setInterval(fetchWeather, 300000); setInterval(fetchKMB, 30000); setInterval(fetchQuote, 3600000);
    </script>
</body>
</html>
