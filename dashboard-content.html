<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Smart Dashboard</title>
    <style>
        /* --- CALM DARK THEME --- */
        :root {
            --bg1: #0b1220;
            --bg2: #111827;
            --panel: #1e293b;
            --panel-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-cyan: #38bdf8;
            --accent-amber: #f59e0b;
            --alert-red: #ef4444;
            --alert-yellow: #facc15;
            --alert-green: #4ade80;
        }

        body.night-mode {
            --bg1: #000000; --bg2: #050505;
            --panel: #0f0f0f;
            --text-main: #d97706; --text-sub: #92400e;
            --accent-cyan: #d97706; --accent-amber: #b45309;
            filter: brightness(0.7);
        }

        body {
            margin: 0; padding: 0; box-sizing: border-box;
            background: linear-gradient(160deg, var(--bg1), var(--bg2));
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden; transition: all 1s ease;
        }

        /* --- GRID LAYOUT --- */
        .app {
            height: 100vh; padding: 15px; box-sizing: border-box;
            display: grid;
            grid-template-rows: 75px 1fr 100px; /* Header, Main, Footer */
            gap: 15px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.7fr 1fr; /* Weather gets ~63%, Utilities get ~37% */
            gap: 15px; min-height: 0;
        }

        .side-column { display: grid; grid-template-rows: 1.1fr 0.9fr; gap: 15px; }

        /* --- PANELS --- */
        .panel {
            background: var(--panel); border: 1px solid var(--panel-border);
            border-radius: 18px; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }
        
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 25px;
        }

        /* --- HEADER STYLES --- */
        .time-group { display: flex; align-items: baseline; gap: 15px; }
        #live-time { font-size: 38px; font-weight: 700; letter-spacing: -0.5px; }
        #live-date { font-size: 16px; color: var(--text-sub); font-weight: 500; }
        
        .status-group { display: flex; align-items: center; gap: 20px; font-size: 20px; font-weight: 600; }
        .warning-badge { background: rgba(239, 68, 68, 0.2); color: var(--alert-red); padding: 5px 12px; border-radius: 8px; font-size: 16px; display: none; }

        /* --- MAIN WEATHER PANEL --- */
        .weather-panel { padding: 25px; justify-content: space-between; }
        .weather-now { display: flex; align-items: center; gap: 25px; }
        .w-icon-big { font-size: 80px; }
        .w-current-temp { font-size: 65px; font-weight: 700; line-height: 1; color: var(--text-main); }
        .w-details { display: flex; flex-direction: column; gap: 5px; }
        .w-desc { font-size: 24px; font-weight: 500; color: var(--accent-cyan); }
        .w-minmax { font-size: 16px; color: var(--text-sub); }

        .hourly-row { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--panel-border); }
        .hour-card { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .h-time { font-size: 14px; color: var(--text-sub); }
        .h-icon { font-size: 24px; }
        .h-temp { font-size: 18px; font-weight: 600; }

        /* --- UTILITY PANELS (BUS & QUOTE) --- */
        .panel-title { font-size: 15px; text-transform: uppercase; color: var(--text-sub); font-weight: 700; letter-spacing: 1px; margin: 0 0 15px 0; }
        
        .bus-list { display: flex; flex-direction: column; gap: 12px; flex: 1; justify-content: center; }
        .bus-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(0,0,0,0.2); border-radius: 10px; border-left: 4px solid var(--text-sub); }
        .bus-item.next { border-left-color: var(--accent-cyan); background: rgba(56, 189, 248, 0.05); }
        .bus-time { font-size: 16px; font-weight: 500; }
        .bus-min { font-size: 22px; font-weight: 700; color: var(--accent-cyan); }
        .bus-item.urgent .bus-min { color: var(--alert-red); }

        .quote-panel { justify-content: center; text-align: center; padding: 25px; }
        #quote-text { font-size: 22px; line-height: 1.5; font-family: "Microsoft JhengHei", sans-serif; color: var(--text-main); }
        #quote-author { font-size: 14px; color: var(--text-sub); margin-top: 15px; font-family: "Microsoft JhengHei", sans-serif; }

        /* --- FOOTER 7-DAY STRIP --- */
        .forecast-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 15px 20px; }
        .day-card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        .d-name { font-size: 14px; color: var(--text-sub); font-weight: 500; text-transform: uppercase; }
        .d-icon { font-size: 22px; }
        .d-temp { font-size: 15px; font-weight: 600; }

        /* Hidden Route Button */
        #route-toggle-btn { position: fixed; bottom: 10px; left: 10px; background: transparent; border: none; color: transparent; width: 50px; height: 50px; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app">
        <!-- HEADER -->
        <header class="panel topbar">
            <div class="time-group">
                <div id="live-time">00:00</div>
                <div id="live-date">Loading...</div>
            </div>
            <div class="status-group">
                <div class="warning-badge" id="warning-badge">⚠️ Warning</div>
                <div style="color: var(--accent-amber);" id="header-temp">--°C</div>
                <div style="color: var(--accent-cyan);" id="header-hum">--%</div>
            </div>
        </header>

        <!-- MAIN GRID -->
        <main class="main-grid">
            <!-- WEATHER PANEL -->
            <section class="panel weather-panel">
                <div class="weather-now">
                    <div class="w-icon-big" id="w-main-icon">⛅</div>
                    <div>
                        <div class="w-current-temp" id="w-main-temp">--°</div>
                    </div>
                    <div class="w-details">
                        <div class="w-desc" id="w-main-desc">Loading Forecast...</div>
                        <div class="w-minmax" id="w-main-minmax">--° / --°</div>
                        <div class="w-minmax" id="w-uv" style="margin-top:5px;">UV: --</div>
                    </div>
                </div>
                
                <div class="hourly-row" id="hourly-container">
                    <!-- Hourly injected by JS -->
                </div>
            </section>

            <!-- SIDE UTILITIES -->
            <aside class="side-column">
                <section class="panel bus-panel">
                    <div class="panel-title" id="bus-header">🚍 KMB Schedule</div>
                    <div class="bus-list" id="kmb-data">
                        <div class="bus-item"><span class="bus-time">Loading...</span></div>
                    </div>
                </section>

                <section class="panel quote-panel">
                    <div id="quote-text">載入中...</div>
                    <div id="quote-author">-</div>
                </section>
            </aside>
        </main>

        <!-- 7-DAY STRIP -->
        <footer class="panel forecast-strip" id="forecast-strip">
            <!-- 7 Days injected by JS -->
        </footer>
    </div>

    <!-- Hidden menu trigger for legacy support -->
    <button id="route-toggle-btn" onclick="fetchKMB()">.</button>

    <script>
        // --- CLOCK ---
        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            
            const hour = now.getHours();
            if (hour >= 23 || hour < 6) document.body.classList.add('night-mode');
            else document.body.classList.remove('night-mode');
        }
        setInterval(updateClock, 1000); updateClock();

        // --- HKO ICON MAPPER ---
        function getHkoEmoji(iconNum) {
            const num = parseInt(iconNum);
            if (num >= 50 && num <= 54) return '☀️'; // Sunny
            if (num >= 60 && num <= 61) return '⛅'; // Cloudy
            if (num >= 62 && num <= 65) return '🌧️'; // Rain
            if (num >= 70 && num <= 77) return '⛈️'; // Thunderstorm
            return '☁️'; // Default
        }

        // --- WEATHER LOGIC ---
        async function fetchWeather() {
            try {
                // 1. Current Conditions
                const resCurrent = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en');
                const wData = await resCurrent.json();
                const ktTemp = wData.temperature.data.find(t => t.place === "Kwun Tong") || wData.temperature.data[0];
                const uv = wData.uvindex ? wData.uvindex.data[0].value : '--';
                
                document.getElementById('header-temp').innerText = `${ktTemp.value}°C`;
                document.getElementById('header-hum').innerText = `${wData.humidity.data[0].value}%`;
                document.getElementById('w-main-temp').innerText = `${ktTemp.value}°`;
                document.getElementById('w-uv').innerText = `UV Index: ${uv}`;

                // 2. Warnings
                const resWarn = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en');
                const warnData = await resWarn.json();
                const badge = document.getElementById('warning-badge');
                if (warnData && Object.keys(warnData).length > 0) {
                    badge.innerText = `⚠️ ${warnData[Object.keys(warnData)[0]].name}`;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }

                // 3. 9-Day Forecast (for Bottom Strip & Today's min/max)
                const resForecast = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=en');
                const fData = await resForecast.json();
                
                // Update Today's Panel Info
                const today = fData.weatherForecast[0];
                document.getElementById('w-main-minmax').innerText = `${today.forecastMintemp.value}° / ${today.forecastMaxtemp.value}°`;
                document.getElementById('w-main-desc').innerText = today.forecastWeather.split('.')[0]; // Shorten description
                document.getElementById('w-main-icon').innerText = getHkoEmoji(today.ForecastIcon);

                // Populate 7-Day Footer Strip (Skip index 0 which is today)
                const strip = document.getElementById('forecast-strip');
                strip.innerHTML = '';
                for (let i = 1; i <= 7; i++) {
                    const day = fData.weatherForecast[i];
                    strip.innerHTML += `
                        <div class="day-card">
                            <div class="d-name">${day.week.substring(0,3)}</div>
                            <div class="d-icon">${getHkoEmoji(day.ForecastIcon)}</div>
                            <div class="d-temp">${day.forecastMintemp.value}° - ${day.forecastMaxtemp.value}°</div>
                        </div>
                    `;
                }

                // 4. Generate Mock Hourly Timeline (Since HKO lacks simple hourly JSON)
                const hourlyCont = document.getElementById('hourly-container');
                hourlyCont.innerHTML = '';
                let currentHour = new Date().getHours();
                let baseTemp = ktTemp.value;

                for (let i = 1; i <= 5; i++) {
                    let displayHour = (currentHour + (i * 2)) % 24; // Every 2 hours
                    let ampm = displayHour >= 12 ? 'PM' : 'AM';
                    let h12 = displayHour % 12 || 12;
                    let timeStr = i === 5 ? 'TMRW' : `${h12} ${ampm}`;
                    
                    // Slightly adjust temp logic for realism (cooler at night)
                    let modTemp = baseTemp + (displayHour > 8 && displayHour < 16 ? 1 : -1);
                    
                    hourlyCont.innerHTML += `
                        <div class="hour-card">
                            <div class="h-time">${timeStr}</div>
                            <div class="h-icon">${getHkoEmoji(today.ForecastIcon)}</div>
                            <div class="h-temp">${modTemp}°</div>
                        </div>
                    `;
                }

            } catch (e) { console.error("Weather Error", e); }
        }

        // --- COMPACT BUS LOGIC ---
        const busConfig = { stopId: '215D99B3E2A5F8DD', route: '215X', dir: 'O', desc: 'To Kowloon' };
        
        async function fetchKMB() {
            document.getElementById('bus-header').innerText = `🚍 ${busConfig.route} ${busConfig.desc}`;
            try {
                const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${busConfig.stopId}/${busConfig.route}/1`);
                const result = await response.json();
                const container = document.getElementById('kmb-data'); container.innerHTML = '';
                
                if (result.data) {
                    let validBuses = result.data.filter(b => b.eta && b.dir === busConfig.dir).sort((a, b) => new Date(a.eta) - new Date(b.eta));
                    let seenMins = new Set(); let count = 0;
                    
                    for (let bus of validBuses) {
                        if (count >= 3) break; // Only show next 3 buses to keep it compact
                        let diffMins = Math.max(0, Math.round((new Date(bus.eta) - new Date()) / 60000));
                        if (seenMins.has(diffMins)) continue; seenMins.add(diffMins);
                        
                        let displayMins = `${diffMins}m`;
                        let cls = count === 0 ? 'next' : '';
                        if (diffMins <= 2) { displayMins = 'Arr'; cls += ' urgent'; }

                        container.innerHTML += `
                        <div class="bus-item ${cls}">
                            <span class="bus-time">${new Date(bus.eta).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'})}</span>
                            <span class="bus-min">${displayMins}</span>
                        </div>`;
                        count++;
                    }
                    if(count === 0) container.innerHTML = '<div class="bus-item"><span class="bus-time">No buses</span></div>';
                }
            } catch (e) { container.innerHTML = '<div class="bus-item">Error</div>'; }
        }

        // --- QUOTE LOGIC ---
        const backupQuotes = [
            { text: "千里之行，始於足下。", author: "老子" },
            { text: "知者不惑，仁者不憂，勇者不懼。", author: "孔子" },
            { text: "天行健，君子以自強不息。", author: "《周易》" }
        ];

        async function fetchQuote() {
            try {
                const response = await fetch('https://v1.hitokoto.cn/?c=i&c=d&c=k', { headers: { 'Accept': 'application/json' }});
                if (!response.ok) throw new Error();
                const data = await response.json();
                document.getElementById('quote-text').innerText = `「${data.hitokoto}」`;
                document.getElementById('quote-author').innerText = `- ${data.from_who || data.from || "佚名"}`;
            } catch (e) {
                const randomQuote = backupQuotes[Math.floor(Math.random() * backupQuotes.length)];
                document.getElementById('quote-text').innerText = `「${randomQuote.text}」`;
                document.getElementById('quote-author').innerText = `- ${randomQuote.author}`;
            }
        }

        fetchWeather(); fetchKMB(); fetchQuote(); 
        setInterval(fetchWeather, 300000); // 5 mins
        setInterval(fetchKMB, 30000);      // 30 secs
        setInterval(fetchQuote, 3600000);  // 1 hour
    </script>
</body>
</html>
