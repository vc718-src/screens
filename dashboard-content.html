<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Smart Dashboard</title>
    <style>
        :root {
            --bg-color: #0b1120;
            --panel-bg: rgba(30, 41, 59, 0.4);
            --card-bg: rgba(15, 23, 42, 0.7);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-bus: #38bdf8;
            --accent-mtr: #10b981;
            --alert-red: #ef4444;
            --alert-yellow: #f59e0b;
            --alert-green: #4ade80;
        }

        body {
            background-color: var(--bg-color); 
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 100% 100%, hsla(225,39%,20%,0.3) 0, transparent 50%);
            color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: clamp(10px, 2vw, 20px); box-sizing: border-box; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; gap: 15px;
        }
        
        .top-bar {
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; padding: clamp(10px, 2vh, 20px) clamp(20px, 3vw, 30px);
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 5px 15px -5px rgba(0,0,0,0.5);
            display: flex; justify-content: space-between; align-items: center;
        }

        .datetime-group { display: flex; align-items: baseline; gap: 15px; }
        .clock-text { font-size: clamp(24px, 4vh, 36px); font-weight: 700; color: #fff; }
        .date-text { font-size: clamp(14px, 2vh, 20px); color: var(--text-sub); font-weight: 500; }

        .weather-group { display: flex; gap: clamp(10px, 2vw, 25px); align-items: center; }
        .weather-item { display: flex; align-items: center; gap: 8px; font-size: clamp(16px, 2.5vh, 24px); font-weight: 600; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(15px, 3vw, 30px); flex: 1; min-height: 0; }
        
        .panel { 
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; padding: clamp(15px, 3vw, 30px); display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        
        h2 { margin-top: 0; font-size: clamp(20px, 3.5vh, 32px); margin-bottom: clamp(15px, 3vh, 25px); font-weight: 700; }
        
        .data-container { flex: 1; display: flex; flex-direction: column; gap: clamp(10px, 2vh, 15px); justify-content: flex-start; }
        
        .data-card { 
            background: var(--card-bg); padding: clamp(15px, 2.5vh, 20px) clamp(20px, 3vw, 30px); 
            border-radius: 16px; display: flex; justify-content: space-between; align-items: center; 
            border-left: 6px solid #334155;
        }
        
        .main-text { font-size: clamp(18px, 3vh, 28px); font-weight: 500; }
        .sub-text { font-size: clamp(12px, 1.8vh, 18px); color: var(--text-sub); margin-top: 4px; display: block;}
        .highlight-text { font-weight: 900; font-size: clamp(28px, 5vh, 46px); }
        
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.6; text-shadow: 0 0 15px rgba(239, 68, 68, 0.8); } 100% { opacity: 1; } }
        .is-arriving { color: var(--alert-red); animation: pulse-red 2s infinite; }

        #route-toggle-btn {
            position: fixed; bottom: 15px; left: 20px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255,255,255,0.05); color: rgba(255, 255, 255, 0.2); 
            border-radius: 8px; padding: 8px 12px; font-size: 12px; cursor: pointer; z-index: 100;
        }
        #route-menu {
            position: fixed; bottom: 60px; left: 20px; background: rgba(15, 23, 42, 0.95); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; display: none; 
            flex-direction: column; gap: 8px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .route-option-btn { background: transparent; color: #e2e8f0; border: none; padding: 10px; text-align: left; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="datetime-group">
            <div class="clock-text" id="live-time">00:00</div>
            <div class="date-text" id="live-date">Loading...</div>
        </div>
        <div class="weather-group" id="weather-header"></div>
    </div>

    <div class="dashboard-grid">
        <!-- Left Side: KMB -->
        <div class="panel">
            <h2 id="bus-header" style="color: var(--accent-bus);">🚍 Loading...</h2>
            <div class="data-container" id="kmb-data"></div>
        </div>

        <!-- Right Side: MTR -->
        <div class="panel">
            <h2 style="color: var(--accent-mtr);">🚇 MTR (Lam Tin)</h2>
            <div class="data-container" id="mtr-data">
                <div class="data-card"><span class="main-text">Fetching MTR...</span></div>
            </div>
        </div>
    </div>

    <button id="route-toggle-btn" onclick="toggleRouteMenu()">⚲ Change Route</button>
    <div id="route-menu"></div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        const predefinedRoutes = [
            { id: 0, stopId: '215D99B3E2A5F8DD', route: '215X', dir: 'O', desc: 'To Kowloon Station' },
            { id: 1, stopId: '92AA28BBE48D6B2E', route: '16',   dir: 'O', desc: 'To Mong Kok' },
            { id: 2, stopId: '6C6B36F7550907CE', route: '14',   dir: 'O', desc: 'To China Ferry Terminal' },
            { id: 3, stopId: '9D676B8892807F9D', route: '603',  dir: 'O', desc: 'To Central' }
        ];
        let currentRouteIndex = 0;

        function buildMenu() {
            const menu = document.getElementById('route-menu');
            predefinedRoutes.forEach((r, index) => {
                menu.innerHTML += `<button class="route-option-btn" onclick="selectRoute(${index})">🚍 ${r.route} (${r.desc})</button>`;
            });
        }
        function toggleRouteMenu() { document.getElementById('route-menu').style.display = (document.getElementById('route-menu').style.display === 'flex') ? 'none' : 'flex'; }
        function selectRoute(index) { currentRouteIndex = index; toggleRouteMenu(); fetchKMB(); }
        buildMenu();

        async function fetchKMB() {
            const config = predefinedRoutes[currentRouteIndex];
            document.getElementById('bus-header').innerText = `🚍 ${config.route} ${config.desc}`;
            try {
                const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${config.stopId}/${config.route}/1`);
                const result = await response.json();
                const container = document.getElementById('kmb-data'); container.innerHTML = '';
                if (result.data) {
                    let validBuses = result.data.filter(b => b.eta && b.dir === config.dir).sort((a, b) => new Date(a.eta) - new Date(b.eta));
                    let seenMins = new Set(); let count = 0;
                    for (let bus of validBuses) {
                        if (count >= 4) break;
                        let diffMins = Math.max(0, Math.round((new Date(bus.eta) - new Date()) / 60000));
                        if (seenMins.has(diffMins)) continue; seenMins.add(diffMins);
                        
                        let color = 'var(--alert-green)'; let displayMins = `${diffMins} <span style="font-size: 0.5em;">MIN</span>`; let animClass = '';
                        if (diffMins <= 2) { color = 'var(--alert-red)'; displayMins = 'Arriving'; animClass = 'is-arriving'; } 
                        else if (diffMins <= 10) { color = 'var(--alert-yellow)'; }

                        container.innerHTML += `
                        <div class="data-card" style="border-left-color: ${color}">
                            <div><span class="main-text">${new Date(bus.eta).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'})}</span></div>
                            <span class="highlight-text ${animClass}" style="color: ${color}">${displayMins}</span>
                        </div>`;
                        count++;
                    }
                    if(count === 0) container.innerHTML = '<div class="data-card"><span class="main-text">No scheduled buses</span></div>';
                }
            } catch (e) {}
        }

        // --- NEW MTR LOGIC ---
        const mtrDests = { 'TKL': 'Tiu Keng Leng', 'WHA': 'Whampoa', 'KWT': 'Kwun Tong', 'HOP': 'Ho Man Tin' };
        
        async function fetchMTR() {
            try {
                const res = await fetch('https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=KTL&sta=LAT');
                const data = await res.json();
                const container = document.getElementById('mtr-data');
                container.innerHTML = '';

                if (data.status === 1 && data.data['KTL-LAT']) {
                    const stationData = data.data['KTL-LAT'];
                    let allTrains = [];
                    
                    if(stationData.UP) allTrains = allTrains.concat(stationData.UP);
                    if(stationData.DOWN) allTrains = allTrains.concat(stationData.DOWN);
                    
                    allTrains.sort((a, b) => parseInt(a.ttnt) - parseInt(b.ttnt));
                    let count = 0;

                    for (let train of allTrains) {
                        if (count >= 4) break;
                        let mins = parseInt(train.ttnt);
                        let color = 'var(--alert-green)'; 
                        let displayMins = `${mins} <span style="font-size: 0.5em;">MIN</span>`;
                        let animClass = '';
                        
                        if (mins <= 1) { color = 'var(--alert-red)'; displayMins = 'Arriving'; animClass = 'is-arriving'; } 
                        else if (mins <= 4) { color = 'var(--alert-yellow)'; }

                        container.innerHTML += `
                        <div class="data-card" style="border-left-color: ${color}">
                            <div>
                                <span class="main-text">To ${mtrDests[train.dest] || train.dest}</span>
                                <span class="sub-text">Platform ${train.plat}</span>
                            </div>
                            <span class="highlight-text ${animClass}" style="color: ${color}">${displayMins}</span>
                        </div>`;
                        count++;
                    }
                }
            } catch (e) { document.getElementById('mtr-data').innerHTML = '<div class="data-card"><span class="main-text" style="color:var(--alert-red)">MTR API Error</span></div>'; }
        }

        async function fetchWeather() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en');
                const wData = await res.json();
                const ktTemp = wData.temperature.data.find(t => t.place === "Kwun Tong") || wData.temperature.data[0];
                document.getElementById('weather-header').innerHTML = `
                    <div class="weather-item" style="color: #f59e0b;"><span style="font-size:1.2em">🌡️</span> ${ktTemp.value}°C</div>
                    <div class="weather-item" style="color: #38bdf8;"><span style="font-size:1.2em">💧</span> ${wData.humidity.data[0].value}%</div>
                `;
            } catch (e) {}
        }

        fetchKMB(); setInterval(fetchKMB, 30000);
        fetchMTR(); setInterval(fetchMTR, 30000);
        fetchWeather(); setInterval(fetchWeather, 300000);
    </script>
</body>
</html>
